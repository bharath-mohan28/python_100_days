<!DOCTYPE html>
<html>
<head>
    <title>Little Lemon</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        #logo {
            width: 150px;
            margin-top: 20px;
        }

        h1 {
            color: #2c3e50;
            margin-top: 20px;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin: 30px 0;
        }

        .menu-item {
            background: white;
            width: 300px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: left;
            transition: transform 0.2s;
        }

        .menu-item:hover {
            transform: scale(1.03);
        }

        h2 {
            margin: 0;
            color: #27ae60;
        }

        span {
            background-color: #e74c3c;
            color: white;
            font-size: 12px;
            padding: 3px 6px;
            border-radius: 5px;
            margin-left: 8px;
        }

        p {
            margin: 5px 0 0;
            color: #555;
        }

        #copyright {
            margin-top: 40px;
            padding: 15px;
            background-color: #2c3e50;
            color: white;
        }
    </style>
</head>
<body>

    <img src="logo.png" id="logo">

    <h1>Our Menu</h1>

    <div class="menu-container">

        <div class="menu-item">
            <h2>Falafel <span>NEW</span></h2>
            <p>Chickpea, herbs, spices.</p>
        </div>

        <div class="menu-item">
            <h2>Pasta Salad</h2>
            <p>Pasta, vegetables, mozzarella.</p>
        </div>

        <div class="menu-item">
            <h2>Fried Calamari</h2>
            <p>Squid, buttermilk.</p>
        </div>

    </div>

    <p id="copyright">
        © 2026 Little Lemon
    </p>

</body>
</html>
